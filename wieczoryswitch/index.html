<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Satsuma pod Przykrywką - Switch</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: Inter, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0b1020;
            color: #f8fafc;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top left, rgba(99, 102, 241, 0.55), transparent 24%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.35), transparent 20%),
                linear-gradient(180deg, #0b1120, #0f172a 45%, #111827);
        }

        .page {
            max-width: 820px;
            margin: 0 auto;
            padding: 4.5rem 1.5rem;
        }

        .card {
            position: relative;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.82), rgba(15, 23, 42, 0.68));
            border: 1px solid rgba(129, 140, 248, 0.32);
            border-radius: 28px;
            padding: 3.25rem;
            box-shadow:
                0 0 0 1px rgba(255, 255, 255, 0.02) inset,
                0 18px 60px rgba(2, 6, 23, 0.55),
                0 0 40px rgba(99, 102, 241, 0.12);
        }

        .card::before {
            content: '';
            position: absolute;
            inset: -40% auto auto -20%;
            width: 280px;
            height: 280px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.45), transparent 68%);
            filter: blur(4px);
            pointer-events: none;
        }

        .title {
            position: relative;
            z-index: 1;
            margin: 0;
            font-size: clamp(2.5rem, 6vw, 4rem);
            line-height: 1.04;
            letter-spacing: -0.055em;
            text-shadow: 0 0 18px rgba(129, 140, 248, 0.18);
        }

        .subtitle {
            position: relative;
            z-index: 1;
            margin: 1.1rem 0 0;
            font-size: 1.1rem;
            line-height: 1.75;
            color: #94a3b8;
            max-width: 46rem;
        }

        .downloads {
            position: relative;
            z-index: 1;
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 1rem;
            margin-top: 2.25rem;
        }

        .download-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 68px;
            padding: 1rem 1.2rem;
            border-radius: 18px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.98rem;
            color: #f8fafc;
            text-align: center;
            background: linear-gradient(135deg, #6366f1, #8b5cf6 58%, #a855f7);
            border: 1px solid rgba(129, 140, 248, 0.35);
            box-shadow:
                0 10px 24px rgba(99, 102, 241, 0.32),
                0 2px 0 rgba(255, 255, 255, 0.06) inset;
            transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
        }

        .download-link:hover,
        .download-link:focus-visible {
            transform: translateY(-4px);
            box-shadow:
                0 16px 32px rgba(99, 102, 241, 0.38),
                0 2px 0 rgba(255, 255, 255, 0.08) inset;
            filter: brightness(1.04);
        }

        .download-link.secondary {
            background:
                linear-gradient(180deg, rgba(15, 23, 42, 0.92), rgba(30, 41, 59, 0.9));
            border: 1px solid rgba(148, 163, 184, 0.2);
            box-shadow: 0 10px 24px rgba(15, 23, 42, 0.25);
        }

        @media (max-width: 720px) {
            .page {
                padding: 2rem 1rem;
            }

            .card {
                padding: 2rem 1.2rem;
                border-radius: 22px;
            }

            .downloads {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <main class="page">
        <section class="card" aria-label="Informacje o Wieczorach Switch">
            <h1 class="title">Satsuma Pod Przykrywką - Gry Switch</h1>
            <p class="subtitle">Na wieczorach gier będą organizowane sesje gier na emulatorze (shh) Nintendo Switch.</p>
            <div class="downloads">
                <a class="download-link" href="https://switchfirm.org/download/global/Firmware%2017.0.0.zip" download>Pobierz Firmware (17.0.0)</a>
                <a class="download-link secondary" href="https://prodkeys.anydoor.cc/prodkeys/switchKeys.io-V17.0.0.zip" download>Pobierz klucze (17.0.0)</a>
                <a class="download-link" href="https://www.blueroms.ws/switch" target="_blank" rel="noopener noreferrer">Tutaj pobierzesz gry</a>
            </div>
        </section>
    </main>
</body>
</html>
